<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#000000">
    <title>PrizeRx</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            font-family: 'Inter', sans-serif;
        }

        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-medium: rgba(255, 255, 255, 0.06);
            --glass-strong: rgba(255, 255, 255, 0.1);
            --border: rgba(255, 255, 255, 0.08);
            --border-light: rgba(255, 255, 255, 0.15);
            --bronze: #cd7f32;
            --silver: #c0c0c0;
            --gold: #ffd700;
            --accent: #6366f1;
            --accent2: #a855f7;
            --green: #22c55e;
        }

        /* ── PREMIUM ANIMATIONS ── */
        @keyframes diamondFloat {
            0%,100% { transform: translateY(0) rotate(0deg); }
            33% { transform: translateY(-12px) rotate(5deg); }
            66% { transform: translateY(-6px) rotate(-3deg); }
        }
        @keyframes diamondSpin {
            0% { transform: rotateY(0deg) scale(1); }
            50% { transform: rotateY(180deg) scale(1.15); }
            100% { transform: rotateY(360deg) scale(1); }
        }
        @keyframes shimmerMove {
            0% { background-position: -200% center; }
            100% { background-position: 200% center; }
        }
        @keyframes pulseGlow {
            0%,100% { box-shadow: 0 0 0 0 rgba(99,102,241,0); }
            50% { box-shadow: 0 0 20px 6px rgba(99,102,241,0.35); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(24px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to   { opacity: 1; }
        }
        @keyframes rippleOut {
            0% { transform: scale(0); opacity: 0.5; }
            100% { transform: scale(4); opacity: 0; }
        }
        @keyframes badgePop {
            0% { transform: scale(0); }
            70% { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        @keyframes orbFloat {
            0%,100% { transform: translate(0,0) scale(1); }
            50% { transform: translate(20px,-30px) scale(1.1); }
        }

        /* ── DIAMOND LOGO ANIMATION ── */
        .diamond-logo {
            display: inline-block;
            animation: diamondFloat 4s ease-in-out infinite;
            filter: drop-shadow(0 0 16px rgba(99,102,241,0.7));
        }
        .diamond-logo:hover { animation: diamondSpin 1s ease-in-out; }

        /* ── RIPPLE ── */
        .ripple-wrap { position: relative; overflow: hidden; }
        .ripple-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255,255,255,0.25);
            pointer-events: none;
            animation: rippleOut 0.55s ease-out forwards;
        }

        /* ── PREMIUM GRADIENT TEXT ── */
        .grad-text {
            background: linear-gradient(135deg, #fff 0%, #a78bfa 50%, #60a5fa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .grad-text-gold {
            background: linear-gradient(135deg, #ffd700, #ff9500, #ffd700);
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: shimmerMove 3s linear infinite;
        }

        /* ── PREMIUM CARD ── */
        .premium-card {
            background: linear-gradient(135deg, rgba(99,102,241,0.12), rgba(168,85,247,0.08));
            border: 1px solid rgba(99,102,241,0.25);
            border-radius: 20px;
            padding: 20px;
            margin-bottom: 16px;
            animation: slideUp 0.4s ease both;
        }
        .premium-card:nth-child(2) { animation-delay: 0.05s; }
        .premium-card:nth-child(3) { animation-delay: 0.1s; }

        /* ── MISSION CARD ── */
        .mission-card {
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 14px 16px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            transition: all 0.25s;
        }
        .mission-card.done {
            background: rgba(34,197,94,0.08);
            border-color: rgba(34,197,94,0.25);
        }
        .mission-icon {
            width: 42px; height: 42px;
            border-radius: 12px;
            background: rgba(99,102,241,0.15);
            border: 1px solid rgba(99,102,241,0.2);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 20px;
        }
        .mission-done-icon {
            width: 28px; height: 28px;
            border-radius: 50%;
            background: var(--green);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            font-size: 14px;
        }
        .mission-progress {
            height: 4px;
            background: rgba(255,255,255,0.08);
            border-radius: 2px;
            overflow: hidden;
            margin-top: 6px;
        }
        .mission-progress-bar {
            height: 100%;
            border-radius: 2px;
            background: linear-gradient(90deg, #6366f1, #a855f7);
            transition: width 0.4s ease;
        }

        /* ── PROFILE EDIT ── */
        .edit-avatar-ring {
            position: relative;
            width: 100px; height: 100px;
            margin: 0 auto 16px;
            cursor: pointer;
        }
        .edit-avatar-ring img,
        .edit-avatar-ring .avatar-placeholder {
            width: 100px; height: 100px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid rgba(99,102,241,0.5);
        }
        .edit-avatar-ring .avatar-placeholder {
            background: rgba(255,255,255,0.08);
            display: flex; align-items: center; justify-content: center;
        }
        .edit-avatar-badge {
            position: absolute;
            bottom: 4px; right: 4px;
            width: 28px; height: 28px;
            border-radius: 50%;
            background: #6366f1;
            display: flex; align-items: center; justify-content: center;
            border: 2px solid #000;
            font-size: 14px;
        }

        /* ── ADBLOCK BANNER ── */
        .adblock-banner {
            background: linear-gradient(135deg, rgba(239,68,68,0.15), rgba(239,68,68,0.08));
            border: 1px solid rgba(239,68,68,0.3);
            border-radius: 14px;
            padding: 14px 16px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        /* ── ORBS (ambient bg) ── */
        .orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: -1;
            animation: orbFloat 12s ease-in-out infinite;
        }
        .orb-1 { width:300px;height:300px;background:rgba(99,102,241,0.07);top:-80px;right:-80px; }
        .orb-2 { width:250px;height:250px;background:rgba(168,85,247,0.05);bottom:80px;left:-60px;animation-delay:-6s; }

        html, body {
            background: #000;
            color: #fff;
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            width: 100%;
            -webkit-text-size-adjust: 100%;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        .ambient {
            position: fixed;
            inset: 0;
            z-index: -2;
            background: 
                radial-gradient(ellipse 100% 100% at 50% 0%, rgba(255,255,255,0.03) 0%, transparent 50%),
                radial-gradient(ellipse 60% 40% at 80% 100%, rgba(255,255,255,0.02) 0%, transparent 50%);
            animation: ambientMove 15s ease infinite;
        }

        @keyframes ambientMove {
            0%, 100% { transform: scale(1) rotate(0deg); opacity: 1; }
            50% { transform: scale(1.1) rotate(1deg); opacity: 0.8; }
        }

        .noise {
            position: fixed;
            inset: 0;
            z-index: -1;
            opacity: 0.015;
            background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
            pointer-events: none;
        }

        #app {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: #000;
            overflow: hidden;
        }

        #authScreen {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000;
            background: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }

        #authScreen.hidden {
            display: none !important;
        }

        #mainScreens {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
        }
        #mainScreens.hidden {
            display: none !important;
        }

        .auth-logo {
            width: 80px;
            height: 80px;
            border: 1px solid var(--border);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 32px;
            background: var(--glass);
            backdrop-filter: blur(20px);
            animation: float 6s ease infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .auth-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 8px;
            text-align: center;
        }

        .auth-subtitle {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 40px;
        }

        .auth-form {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-field {
            background: rgba(255,255,255,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 16px;
            padding: 16px 20px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
            width: 100%;
        }

        .input-field::placeholder { color: rgba(255,255,255,0.4); }

        .input-field:focus {
            border-color: rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.12);
        }

        .btn-primary {
            background: white;
            color: black;
            border: none;
            border-radius: 16px;
            padding: 16px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 8px;
            transition: transform 0.2s, opacity 0.2s;
        }

        .btn-primary:active {
            transform: scale(0.96);
            opacity: 0.9;
        }

        .btn-secondary {
            background: transparent;
            color: rgba(255,255,255,0.6);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-secondary:active {
            background: var(--glass);
            transform: scale(0.96);
        }

        .btn-danger {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
            border-radius: 16px;
            padding: 16px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-danger:active {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(0.96);
        }

        .screen {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            width: 100%;
            overflow-y: auto;
            overflow-x: hidden;
            padding: 20px;
            padding-bottom: 100px;
            -webkit-overflow-scrolling: touch;
            background: #000;
        }

        .screen.active {
            display: block;
        }
        #chatScreen.active {
            display: flex;
            flex-direction: column;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 20px;
        }

        .glass-hover {
            transition: all 0.3s;
        }

        .glass-hover:active {
            transform: scale(0.98);
            background: var(--glass-medium);
            border-color: var(--border-light);
        }

        .screen-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-top: 8px;
        }

        .header-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
        }

        .header-subtitle {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
        }

        .balance-pill {
            display: flex;
            gap: 8px;
        }

        .pill {
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 8px 14px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 13px;
            font-weight: 600;
        }

        .icon-d {
            width: 16px;
            height: 16px;
            border: 1.5px solid white;
            transform: rotate(45deg);
            background: linear-gradient(135deg, rgba(255,255,255,0.3), transparent);
        }

        .ad-section {
            background: linear-gradient(135deg, var(--glass-medium) 0%, var(--glass) 100%);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 32px 24px;
            text-align: center;
            margin-bottom: 20px;
            position: relative;
            overflow: hidden;
        }

        .ad-icon {
            width: 64px;
            height: 64px;
            border: 1px solid var(--border);
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            background: var(--glass);
            animation: pulse 3s ease infinite;
        }

        @keyframes pulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,255,255,0.1); }
            50% { box-shadow: 0 0 20px 5px rgba(255,255,255,0.05); }
        }

        .ad-btn {
            width: 100%;
            background: white;
            color: black;
            border: none;
            border-radius: 16px;
            padding: 18px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .ad-btn:disabled {
            opacity: 0.6;
            cursor: wait;
        }

        .ad-progress {
            position: absolute;
            bottom: 0;
            left: 0;
            height: 3px;
            background: rgba(0,0,0,0.2);
            transition: width 1s linear;
        }

        .section-title {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .scroll-container {
            display: flex;
            gap: 12px;
            overflow-x: auto;
            scroll-snap-type: x mandatory;
            padding-bottom: 8px;
            margin-bottom: 24px;
            -webkit-overflow-scrolling: touch;
        }

        .scroll-container::-webkit-scrollbar {
            display: none;
        }

        .store-card {
            min-width: 160px;
            background: var(--glass);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 20px;
            scroll-snap-align: start;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }

        .store-card:active {
            transform: scale(0.95);
            background: var(--glass-medium);
        }

        .store-card.featured {
            background: var(--glass-medium);
            border-color: var(--border-light);
            position: relative;
        }

        .store-card.featured::before {
            content: 'BEST';
            position: absolute;
            top: 12px;
            right: 12px;
            font-size: 10px;
            font-weight: 700;
            background: white;
            color: black;
            padding: 4px 8px;
            border-radius: 6px;
        }

        .card-icon {
            width: 48px;
            height: 48px;
            border: 1px solid var(--border);
            border-radius: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 12px;
        }

        .card-amount {
            font-family: 'Space Grotesk', sans-serif;
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .card-label {
            font-size: 12px;
            color: rgba(255,255,255,0.4);
            margin-bottom: 16px;
        }

        .card-btn {
            width: 100%;
            background: transparent;
            border: 1px solid var(--border);
            color: white;
            border-radius: 10px;
            padding: 10px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
        }

        .store-card.featured .card-btn {
            background: white;
            color: black;
            border-color: white;
        }

        .redeem-hero {
            background: linear-gradient(135deg, var(--glass-medium), var(--glass));
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 28px;
            margin-bottom: 24px;
        }

        .progress-ring {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px;
            position: relative;
        }

        .progress-ring
